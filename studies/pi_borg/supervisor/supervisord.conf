[unix_http_server]
file=/var/run/supervisor.sock
chmod=0777 ; so pi user can use it without sudo

[inet_http_server]
port=*:9001

[supervisord]
logfile=/home/pi/supervisord.log
pidfile=/var/run/supervisord.pid

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:app]
command=/home/pi/venv/bin/python /home/pi/runapp.py
autorestart=true